name: Build and Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual triggering for testing
    inputs:
      publish_to_test_pypi:
        description: "Publish to Test PyPI instead of PyPI"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  test:
    name: Run Tests Before Publishing
    runs-on: ubuntu-latest
    # Only run on main branch
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests (excluding integration tests)
        run: |
          uv run pytest tests/ -m "not integration" --cov=src/quantrl_lab --cov-report=xml

  build-and-publish:
    name: Build and Publish Package
    runs-on: ubuntu-latest
    needs: test
    # Only run on main branch
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build package
        run: |
          uv build

      - name: Check package contents
        run: |
          tar -tzf dist/*.tar.gz
          echo "---"
          unzip -l dist/*.whl

      # Publish using PyPI API token (traditional method)
      - name: Publish to Test PyPI (Manual trigger only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_test_pypi == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/

      - name: Publish to PyPI (On Release)
        if: github.event_name == 'release'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish

      # Option 2: Publish using Trusted Publishing (more secure, no API token needed)
      # Uncomment the sections below if you prefer to use Trusted Publishing
      # You'll need to configure this on PyPI first
      # See: https://docs.pypi.org/trusted-publishers/

      # - name: Publish to Test PyPI with Trusted Publishing
      #   if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_test_pypi == 'true'
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     repository-url: https://test.pypi.org/legacy/

      # - name: Publish to PyPI with Trusted Publishing
      #   if: github.event_name == 'release'
      #   uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
