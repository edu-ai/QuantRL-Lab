name: QuantRL-Lab CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allows manual triggering

jobs:
  lint:
    name: Run Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run linting
        run: |
          uv run flake8 src tests
          uv run black --check src tests
          uv run isort --check-only src tests

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests (excluding integration tests)
        run: |
          uv run pytest tests/ -m "not integration" --cov=src/quantrl_lab --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  rl-compatibility:
    name: RL Framework Compatibility
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Create compatibility test script
        run: |
          cat > check_env.py << 'EOL'
          import numpy as np
          from stable_baselines3.common.env_checker import check_env
          from quantrl_lab.environments.stock import SingleStockTradingEnv, SingleStockEnvConfig
          from quantrl_lab.environments.stock.strategies.actions.standard import StandardActionStrategy
          from quantrl_lab.environments.stock.strategies.rewards import PortfolioValueChangeReward
          from quantrl_lab.environments.stock.strategies.observations import FeatureAwareObservationStrategy

          # Create test data
          data_size = 100
          PRICE_COLUMN_INDEX = 3
          test_data = np.random.rand(data_size, 5).astype(np.float32)
          test_data[:, PRICE_COLUMN_INDEX] = 50 + np.arange(data_size) * 0.2 + np.random.randn(data_size) * 0.5

          # Create config
          config = SingleStockEnvConfig(
              window_size=10,
              initial_balance=10000.0,
              transaction_cost_pct=0.001,
              slippage=0.0005,
              order_expiration_steps=5
          )

          # Create environment
          env = SingleStockTradingEnv(
              data=test_data,
              config=config,
              action_strategy=StandardActionStrategy(),
              reward_strategy=PortfolioValueChangeReward(),
              observation_strategy=FeatureAwareObservationStrategy(),
              price_column=PRICE_COLUMN_INDEX,
          )

          # Check environment
          check_env(env)
          print('Environment is compatible with StableBaselines3')
          EOL

      - name: Run StableBaselines3 compatibility test
        run: |
          uv run python check_env.py
